version: '3'

tasks:
  setup:
    desc: "Poetry ile projenin bağımlılıklarını kurar."
    cmds:
      - poetry install

  dev:
    desc: "Tüm servisleri Docker Compose ile başlatır (API + DB + pgAdmin)."
    cmds:
      - docker compose -p puk_api -f compose/docker-compose.yml up -d --build
      - echo "API hazır → http://localhost:8000/docs"

  logs:
    desc: "API container loglarını canlı takip eder."
    cmds:
      - docker compose -p puk_api -f compose/docker-compose.yml logs -f puk_api

  test:
    desc: "Tüm ünite testlerini çalıştırır."
    cmds:
      - echo "Henüz test yazılmadı." # yakında pytest eklenecek

  db-up:
    desc: "Tüm PUK (API, DB, pgAdmin) servislerini Docker Compose ile ayağa kaldırır."
    cmds:
      - docker compose -p puk_api -f compose/docker-compose.yml up -d --build

  db-down:
    desc: "PUK veritabanı servislerini durdurur ve siler."
    cmds:
      - docker compose -p puk_api -f compose/docker-compose.yml down

  db-makemigrations:
    desc: "Veritabanı modellerinde yapılan değişiklikleri algılar ve migration script oluşturur."
    cmds:
      - poetry run alembic -c alembic/alembic.ini revision --autogenerate -m "auto_schema_update"

  db-migrate:
    desc: "Oluşan migration'ları veritabanına uygular (Tabloları günceller)."
    cmds:
      - poetry run alembic -c alembic/alembic.ini upgrade head
